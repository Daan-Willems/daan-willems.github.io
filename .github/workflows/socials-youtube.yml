name: Refresh socials — YouTube

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: socials-commit
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID || 'UC0ubM_L6ISEgqr5SJfI8XTA' }}
          YT_STALE_HOURS: '24'
        run: node scripts/fetch-socials.mjs --platform youtube

      - name: Commit if changed
        run: |
          if git diff --quiet -- public/data/socials.json public/images/socials; then
            echo "no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add public/data/socials.json public/images/socials
          git commit -m "chore(socials): refresh youtube"
          git push
