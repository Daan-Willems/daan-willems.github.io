name: Refresh socials data

on:
  schedule:
    # Every 6 hours, on the hour
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: socials
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch socials data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID || 'UC0ubM_L6ISEgqr5SJfI8XTA' }}
          TIKTOK_HANDLE: ${{ vars.TIKTOK_HANDLE || 'daanwillemsautomotive' }}
          IG_HANDLE: ${{ vars.IG_HANDLE || 'daanwillemsautomotive' }}
        run: node scripts/fetch-socials.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- public/data/socials.json; then
            echo "no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/socials.json
          git commit -m "chore(socials): refresh youtube data"
          git push
